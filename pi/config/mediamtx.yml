# MediaMTX configuration for BigMacATAK Pi
# Installed to /etc/mediamtx/mediamtx.yml by install.sh
#
# Streams are proxied over TLS by nginx on ports 8322 (RTSP) and 1936 (RTMP).
# Direct (unencrypted) access is also available on 8554/1935 from localhost.

###############################################
# General

# Logging
logLevel: info
logDestinations: [stdout]

# API (used by OTS to manage streams)
api: yes
apiAddress: 127.0.0.1:9997

# Metrics
metrics: no

###############################################
# RTSP

rtspAddress: :8554
rtspsAddress: :8555    # RTSP over TLS (direct, not via nginx)

# TLS for direct RTSP connections
# nginx handles TLS on :8322 and proxies to :8554 (plain)
# rtspsCertPath: /home/__BIGMAC_USER__/ots/ca/opentakserver.crt
# rtspsKeyPath:  /home/__BIGMAC_USER__/ots/ca/opentakserver.key

###############################################
# RTMP

rtmpAddress: :1935
rtmpsAddress: :1936    # Note: nginx also uses :1936 for TLS RTMP proxy
                       # If using nginx proxy, keep rtmpsAddress disabled or use a different port

###############################################
# HLS

hlsAddress: :8888
hlsAlwaysRemux: no

###############################################
# WebRTC

webRTCAddress: :8889

###############################################
# SRT

srtAddress: :8890

###############################################
# Path defaults

pathDefaults:
  # Allow anyone to read and publish (restrict in production)
  readUser: ""
  readPass: ""
  publishUser: ""
  publishPass: ""

  # Record streams to disk
  record: no
  # recordPath: /home/__BIGMAC_USER__/ots/recordings/%path/%Y-%m-%d_%H-%M-%S-%f

###############################################
# Paths

paths:
  # Accept all streams dynamically
  all_others:
